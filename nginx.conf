worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Log al stdout/stderr para que EasyPanel muestre los logs
  access_log /dev/stdout;
  error_log  /dev/stderr;

  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;

  # Comprime texto (NO vídeo: el mp4 ya está comprimido)
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Vídeo: streaming con soporte de Range requests ---
    # Esto es lo que faltaba en el server de Python. Nginx sirve los mp4
    # por trozos (byte-range), así el navegador carga y hace seek sin bloquear.
    location ~* \.(mp4|webm|mov)$ {
      add_header Accept-Ranges bytes;
      add_header Cache-Control "public, max-age=2592000";  # 30 días
      types { video/mp4 mp4; video/webm webm; video/quicktime mov; }
    }

    # --- CSS / JS: siempre revalidar (304 si no cambió). Evita que el navegador
    #     sirva una mezcla de CSS viejo + JS nuevo (o al revés), que rompe los
    #     reveals. El ?v=… del HTML ya fuerza fresco en cada versión. ---
    location ~* \.(css|js)$ {
      add_header Cache-Control "no-cache";
    }

    # --- Imágenes ---
    location ~* \.(png|jpe?g|gif|svg|webp|ico)$ {
      add_header Cache-Control "public, max-age=604800";    # 7 días
    }

    # --- HTML: nunca cachear (siempre la última versión) ---
    location = /index.html {
      add_header Cache-Control "no-cache";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
